<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directed Graph Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9fafb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 900px;
            height: 700px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        svg {
            width: 100%;
            height: 600px;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        .node rect {
            stroke: #fff;
            stroke-width: 2px;
            cursor: move;
        }
        .node text {
            font-size: 12px;
            fill: #333;
            pointer-events: none;
            font-weight: bold;
        }
        .edge path {
            stroke: #999;
            stroke-width: 1.5px;
            fill: none;
            marker-end: url(#arrow);
        }
        .edge-label {
            font-size: 12px;
            fill: #374151;
            pointer-events: none;
            background: white;
        }
        .edge-label-bg {
            fill: white;
            fill-opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Directed Graph Visualization</h1>
        <svg id="graph"></svg>
    </div>
    <script>
        // Define the graph data
        const data = [
            { source: "0x809CF…77D11", target: "0x59561…D0f5c", label: "Peas #1" },
            { source: "0x59561…D0f5c", target: "0x809CF…77D11", label: "10 USDM" },
            { source: "0xd01AA…825Df", target: "0x59561…D0f5c", label: "0.05 ETH" },
            { source: "0xd01AA…825Df", target: "0x59561…D0f5c", label: "100 TUSDC" }
        ];

        // Extract unique nodes from the data
        const nodeIds = [...new Set(data.flatMap(d => [d.source, d.target]))];
        const nodes = nodeIds.map(id => ({ id }));

        // Set up links with proper references
        const links = data.map(d => ({
            source: d.source,
            target: d.target,
            label: d.label
        }));

        // Set up SVG
        const svg = d3.select("#graph");
        const width = svg.node().getBoundingClientRect().width;
        const height = svg.node().getBoundingClientRect().height;

        // Define node dimensions
        const nodeRadius = 25; // Keep for compatibility with existing code
        const nodeHeight = 40;
        const cornerRadius = 8; // Radius for rounded corners
        const minNodeWidth = 80; // Minimum width for nodes
        const textPadding = 20; // Padding on each side of the text

        // Function to calculate text width
        function getTextWidth(text, fontSize = 12, fontFamily = 'Arial') {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            context.font = `${fontSize}px ${fontFamily}`;
            return context.measureText(text).width;
        }

        // Calculate node width based on text content
        nodes.forEach(node => {
            node.radius = nodeRadius; // Keep for compatibility
            const textWidth = getTextWidth(node.id);
            node.width = Math.max(minNodeWidth, textWidth + textPadding * 2); // Ensure minimum width
            node.height = nodeHeight;
        });

        // Calculate the maximum number of nodes that can fit horizontally
        const horizontalSpacing = 200; // Space between nodes horizontally
        const verticalSpacing = 150;   // Space between rows
        const maxNodesPerRow = Math.floor(width / horizontalSpacing);

        // Custom force to arrange nodes in a grid that prioritizes horizontal space
        function gridForce(alpha) {
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];

                // Calculate row and column for this node
                const row = Math.floor(i / maxNodesPerRow);
                const col = i % maxNodesPerRow;

                // Calculate target position (centered grid)
                const targetX = (col * horizontalSpacing) + (horizontalSpacing / 2) +
                                ((width - (Math.min(nodes.length, maxNodesPerRow) * horizontalSpacing)) / 2);
                const targetY = (row * verticalSpacing) + (verticalSpacing / 2) + 50; // Add some top margin

                // Apply force toward target position
                node.vx = (node.vx || 0) + (targetX - node.x) * alpha * 0.5;
                node.vy = (node.vy || 0) + (targetY - node.y) * alpha * 0.3;
            }
        }

        // Initialize force simulation
        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(300))
            .force("charge", d3.forceManyBody().strength(-100)) // Reduced repulsive force
            .force("collision", d3.forceCollide().radius(d => Math.sqrt((d.width/2)**2 + (d.height/2)**2) + 20)) // Use diagonal of rectangle + padding
            .force("grid", gridForce) // Custom grid force
            .force("x", d3.forceX(width / 2).strength(0.1)) // Weaker horizontal force since grid handles it
            .force("y", d3.forceY(height / 2).strength(0.05)); // Weaker vertical force

        // Add SVG definitions
        const defs = svg.append("defs");

        // Add arrowhead marker for directed edges
        defs.append("marker")
            .attr("id", "arrow")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 10) // Fixed position to center the arrow on the path
            .attr("refY", 0)
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "#999");

        // Function to generate different gradient colors for each node
        function getNodeColors(index) {
            // Array of base colors for different nodes (using pale colors)
            const baseColors = [
                { primary: "rgb(208, 228, 245)", secondary: "rgb(173, 209, 240)" }, // Pale Blue
                { primary: "rgb(245, 220, 208)", secondary: "rgb(240, 200, 173)" }, // Pale Red/Orange
                { primary: "rgb(220, 245, 220)", secondary: "rgb(200, 240, 200)" }  // Pale Green
            ];

            // Get color based on index, cycling through the array if needed
            return baseColors[index % baseColors.length];
        }

        // Create gradients for each node
        nodes.forEach((node, i) => {
            const colors = getNodeColors(i);

            // Create horizontal gradient (left to right) with pale colors
            defs.append("linearGradient")
                .attr("id", `nodeGradient-${i}`)
                .attr("x1", "0%")
                .attr("y1", "0%")
                .attr("x2", "100%")
                .attr("y2", "0%")
                .selectAll("stop")
                .data([
                    {offset: "0%", color: colors.primary},
                    {offset: "100%", color: colors.secondary}
                ])
                .enter().append("stop")
                .attr("offset", d => d.offset)
                .attr("stop-color", d => d.color);

            // Store gradient ID in node data for later use
            node.gradientId = `nodeGradient-${i}`;
        });

        // Add links
        const link = svg.append("g")
            .attr("class", "edge")
            .selectAll("g")
            .data(links)
            .enter()
            .append("g");

        // Function to create curved paths for edges, touching node boundaries
        function getEdgePath(d) {
            // Find source and target node objects
            const sourceNode = nodes.find(n => n.id === d.source.id || n.id === d.source);
            const targetNode = nodes.find(n => n.id === d.target.id || n.id === d.target);

            if (!sourceNode || !targetNode) return "";

            const dx = targetNode.x - sourceNode.x;
            const dy = targetNode.y - sourceNode.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Calculate index for multiple edges between same nodes
            const sameEdges = links.filter(l =>
                (l.source.id === sourceNode.id && l.target.id === targetNode.id) ||
                (l.source === sourceNode.id && l.target === targetNode.id)
            );
            const edgeIndex = sameEdges.indexOf(d);
            const totalEdges = sameEdges.length;

            // Calculate angles and adjust both source and target points to rectangle boundaries
            const angle = Math.atan2(dy, dx);

            // Calculate intersection points with rectangles
            // For source node (outgoing edge)
            let sourceX, sourceY;
            const halfSourceWidth = sourceNode.width / 2;
            const halfSourceHeight = sourceNode.height / 2;

            // Determine which side of the rectangle the edge intersects
            if (Math.abs(Math.tan(angle)) < halfSourceHeight / halfSourceWidth) {
                // Intersects with right or left side
                sourceX = sourceNode.x + (Math.cos(angle) > 0 ? halfSourceWidth : -halfSourceWidth);
                sourceY = sourceNode.y + Math.tan(angle) * (sourceX - sourceNode.x);
            } else {
                // Intersects with top or bottom side
                sourceY = sourceNode.y + (Math.sin(angle) > 0 ? halfSourceHeight : -halfSourceHeight);
                sourceX = sourceNode.x + (sourceY - sourceNode.y) / Math.tan(angle);
            }

            // For target node (incoming edge)
            let targetX, targetY;
            const halfTargetWidth = targetNode.width / 2;
            const halfTargetHeight = targetNode.height / 2;

            // Determine which side of the rectangle the edge intersects
            if (Math.abs(Math.tan(angle)) < halfTargetHeight / halfTargetWidth) {
                // Intersects with right or left side
                targetX = targetNode.x + (Math.cos(angle) < 0 ? halfTargetWidth : -halfTargetWidth);
                targetY = targetNode.y + Math.tan(angle) * (targetX - targetNode.x);
            } else {
                // Intersects with top or bottom side
                targetY = targetNode.y + (Math.sin(angle) < 0 ? halfTargetHeight : -halfTargetHeight);
                targetX = targetNode.x + (targetY - targetNode.y) / Math.tan(angle);
            }

            // For single edges, use a simple quadratic curve
            if (totalEdges === 1) {
                // Calculate control point for a simple curve
                const midX = (sourceX + targetX) / 2;
                const midY = (sourceY + targetY) / 2;
                // Add a slight curve even for single edges
                const normalX = -dy / distance * 20; // perpendicular to the line
                const normalY = dx / distance * 20;  // perpendicular to the line
                return `M${sourceX},${sourceY} Q${midX + normalX},${midY + normalY} ${targetX},${targetY}`;
            } else {
                // For parallel edges, use a more sophisticated approach
                // Calculate the normal vector (perpendicular to the line)
                const normalX = -dy / distance;
                const normalY = dx / distance;

                // Calculate the offset based on the edge index
                // Use a more moderate offset that scales with distance
                const baseOffset = distance * 0.15; // 15% of the distance between nodes
                const maxOffset = Math.min(50, distance * 0.25); // Cap at 50px or 25% of distance

                // Calculate progressive offset for each parallel edge
                let offset;
                if (totalEdges === 2) {
                    // For 2 edges, place them symmetrically on either side
                    offset = edgeIndex === 0 ? -baseOffset : baseOffset;
                } else {
                    // For more edges, distribute them evenly
                    offset = ((edgeIndex / (totalEdges - 1)) * 2 - 1) * maxOffset;
                }

                // Special case for the problematic edges
                if (sourceNode.id === "0xd01AA…825Df" && targetNode.id === "0x59561…D0f5c") {
                    // Use a more pronounced curve but with reasonable offsets
                    const controlPointX = (sourceX + targetX) / 2 + normalX * offset * 1.5;
                    const controlPointY = (sourceY + targetY) / 2 + normalY * offset * 1.5;
                    return `M${sourceX},${sourceY} Q${controlPointX},${controlPointY} ${targetX},${targetY}`;
                } else {
                    // For other parallel edges
                    const controlPointX = (sourceX + targetX) / 2 + normalX * offset;
                    const controlPointY = (sourceY + targetY) / 2 + normalY * offset;
                    return `M${sourceX},${sourceY} Q${controlPointX},${controlPointY} ${targetX},${targetY}`;
                }
            }
        }

        // Draw edges with different styles for parallel edges
        link.append("path")
            .attr("id", (d, i) => `edge${i}`)
            .attr("d", getEdgePath)
            .attr("marker-end", "url(#arrow)");

        // Create separate paths for text to ensure readability
        svg.append("defs").selectAll("path")
            .data(links)
            .enter()
            .append("path")
            .attr("id", (d, i) => `textPath${i}`);

        // Add edge labels using the text-specific paths
        const edgeLabels = link.append("g")
            .attr("class", "edge-label-container");

        // Function to get label text (without enumeration)
        function getLabelText(d) {
            // Simply return the label without any enumeration
            return d.label;
        }

        // Add background for better readability
        edgeLabels.append("text")
            .attr("class", "edge-label-bg")
            .attr("dy", -5)
            .append("textPath")
            .attr("xlink:href", (d, i) => `#textPath${i}`)
            .attr("startOffset", "50%")
            .attr("text-anchor", "middle")
            .text(d => getLabelText(d))
            .attr("stroke", "white")
            .attr("stroke-width", 4)
            .attr("stroke-opacity", 0.8);

        // Add actual text
        edgeLabels.append("text")
            .attr("class", "edge-label")
            .attr("dy", -5)
            .append("textPath")
            .attr("xlink:href", (d, i) => `#textPath${i}`)
            .attr("startOffset", "50%")
            .attr("text-anchor", "middle")
            .text(d => getLabelText(d));

        // Add nodes
        const node = svg.append("g")
            .attr("class", "node")
            .selectAll("g")
            .data(nodes)
            .enter()
            .append("g")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // Draw node rectangles with rounded corners
        node.append("rect")
            .attr("width", d => d.width)
            .attr("height", d => d.height)
            .attr("x", d => -d.width / 2) // Center horizontally
            .attr("y", d => -d.height / 2) // Center vertically
            .attr("rx", cornerRadius) // Rounded corners
            .attr("ry", cornerRadius)
            .attr("fill", d => `url(#${d.gradientId})`);

        // Add node labels
        node.append("text")
            .attr("dy", 5) // Center vertically
            .attr("text-anchor", "middle") // Center horizontally
            .text(d => d.id);

        // Function to create a text path that ensures readability
        function getTextPath(d) {
            // Find source and target node objects
            const sourceNode = nodes.find(n => n.id === d.source.id || n.id === d.source);
            const targetNode = nodes.find(n => n.id === d.target.id || n.id === d.target);

            if (!sourceNode || !targetNode) return "";

            const dx = targetNode.x - sourceNode.x;
            const dy = targetNode.y - sourceNode.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Calculate index for multiple edges between same nodes
            const sameEdges = links.filter(l =>
                (l.source.id === sourceNode.id && l.target.id === targetNode.id) ||
                (l.source === sourceNode.id && l.target === targetNode.id)
            );
            const edgeIndex = sameEdges.indexOf(d);
            const totalEdges = sameEdges.length;

            // Calculate angles and adjust both source and target points to rectangle boundaries
            const angle = Math.atan2(dy, dx);

            // Calculate intersection points with rectangles
            // For source node (outgoing edge)
            let sourceX, sourceY;
            const halfSourceWidth = sourceNode.width / 2;
            const halfSourceHeight = sourceNode.height / 2;

            // Determine which side of the rectangle the edge intersects
            if (Math.abs(Math.tan(angle)) < halfSourceHeight / halfSourceWidth) {
                // Intersects with right or left side
                sourceX = sourceNode.x + (Math.cos(angle) > 0 ? halfSourceWidth : -halfSourceWidth);
                sourceY = sourceNode.y + Math.tan(angle) * (sourceX - sourceNode.x);
            } else {
                // Intersects with top or bottom side
                sourceY = sourceNode.y + (Math.sin(angle) > 0 ? halfSourceHeight : -halfSourceHeight);
                sourceX = sourceNode.x + (sourceY - sourceNode.y) / Math.tan(angle);
            }

            // For target node (incoming edge)
            let targetX, targetY;
            const halfTargetWidth = targetNode.width / 2;
            const halfTargetHeight = targetNode.height / 2;

            // Determine which side of the rectangle the edge intersects
            if (Math.abs(Math.tan(angle)) < halfTargetHeight / halfTargetWidth) {
                // Intersects with right or left side
                targetX = targetNode.x + (Math.cos(angle) < 0 ? halfTargetWidth : -halfTargetWidth);
                targetY = targetNode.y + Math.tan(angle) * (targetX - targetNode.x);
            } else {
                // Intersects with top or bottom side
                targetY = targetNode.y + (Math.sin(angle) < 0 ? halfTargetHeight : -halfTargetHeight);
                targetX = targetNode.x + (targetY - targetNode.y) / Math.tan(angle);
            }

            // Determine if the edge is going from right to left
            const isRightToLeft = sourceNode.x > targetNode.x;

            // For single edges, use a simple quadratic curve
            if (totalEdges === 1) {
                // Calculate control point for a simple curve
                const midX = (sourceX + targetX) / 2;
                const midY = (sourceY + targetY) / 2;
                // Add a slight curve even for single edges
                const normalX = -dy / distance * 20; // perpendicular to the line
                const normalY = dx / distance * 20;  // perpendicular to the line

                // For right-to-left edges, reverse the path direction to keep text readable
                if (isRightToLeft) {
                    return `M${targetX},${targetY} Q${midX + normalX},${midY + normalY} ${sourceX},${sourceY}`;
                } else {
                    return `M${sourceX},${sourceY} Q${midX + normalX},${midY + normalY} ${targetX},${targetY}`;
                }
            } else {
                // For parallel edges, use the same approach as in getEdgePath
                // Calculate the normal vector (perpendicular to the line)
                const normalX = -dy / distance;
                const normalY = dx / distance;

                // Calculate the offset based on the edge index
                // Use a more moderate offset that scales with distance
                const baseOffset = distance * 0.15; // 15% of the distance between nodes
                const maxOffset = Math.min(50, distance * 0.25); // Cap at 50px or 25% of distance

                // Calculate progressive offset for each parallel edge
                let offset;
                if (totalEdges === 2) {
                    // For 2 edges, place them symmetrically on either side
                    offset = edgeIndex === 0 ? -baseOffset : baseOffset;
                } else {
                    // For more edges, distribute them evenly
                    offset = ((edgeIndex / (totalEdges - 1)) * 2 - 1) * maxOffset;
                }

                // Special case for the problematic edges
                let controlPointX, controlPointY;
                if (sourceNode.id === "0xd01AA…825Df" && targetNode.id === "0x59561…D0f5c") {
                    // Use a more pronounced curve but with reasonable offsets
                    controlPointX = (sourceX + targetX) / 2 + normalX * offset * 1.5;
                    controlPointY = (sourceY + targetY) / 2 + normalY * offset * 1.5;
                } else {
                    // For other parallel edges
                    controlPointX = (sourceX + targetX) / 2 + normalX * offset;
                    controlPointY = (sourceY + targetY) / 2 + normalY * offset;
                }

                // For right-to-left edges, reverse the path direction to keep text readable
                if (isRightToLeft) {
                    return `M${targetX},${targetY} Q${controlPointX},${controlPointY} ${sourceX},${sourceY}`;
                } else {
                    return `M${sourceX},${sourceY} Q${controlPointX},${controlPointY} ${targetX},${targetY}`;
                }
            }
        }

        // Update positions on each tick
        simulation.on("tick", () => {
            // Keep nodes within bounds
            nodes.forEach(d => {
                const halfWidth = d.width / 2;
                const halfHeight = d.height / 2;
                d.x = Math.max(halfWidth, Math.min(width - halfWidth, d.x));
                d.y = Math.max(halfHeight, Math.min(height - halfHeight, d.y));
            });

            // Update edge paths
            link.select("path")
                .attr("d", getEdgePath);

            // Update text paths to ensure readability
            links.forEach((d, i) => {
                d3.select(`#textPath${i}`).attr("d", getTextPath(d));
            });

            // Update node positions
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            // Allow node to be positioned by forces again
            d.fx = null;
            d.fy = null;
            // Restart simulation to apply grid force
            simulation.alpha(0.3).restart();
        }
    </script>
</body>
</html>
